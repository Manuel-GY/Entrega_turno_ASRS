version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8083:80"
    volumes:
      # Mantener la base de datos persistida en el host
      - ./db_data:/var/www/html/db_data
    environment:
      - PYTHON_API_URL=http://scraper:8081/api/consultar
    depends_on:
      - scraper

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    ports:
      - "8081:8081"
    environment:
      - FIREFOX_BINARY=/usr/bin/firefox
    shm_size: 2gb # Necesario para evitar crash de Selenium en headless por límite de memoria compartida
